<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1250"/>
      <stop offset="60%" stop-color="#1a0a38"/>
      <stop offset="100%" stop-color="#0e0520"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0395A"/>
      <stop offset="100%" stop-color="#8B1A2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A93A"/>
      <stop offset="100%" stop-color="#A8801A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial glow -->
  <ellipse cx="600" cy="315" rx="550" ry="300" fill="#5B2D8E" opacity="0.18"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="180" fill="#5B2D8E" opacity="0.15"/>
  <circle cx="1100" cy="530" r="220" fill="#C0395A" opacity="0.12"/>
  <circle cx="1050" cy="80" r="120" fill="#D4A93A" opacity="0.1"/>

  <!-- Gift box icon -->
  <g transform="translate(136, 200)">
    <!-- Box body -->
    <rect x="0" y="60" width="120" height="90" rx="8" fill="url(#rose)" opacity="0.9"/>
    <!-- Box lid -->
    <rect x="-8" y="42" width="136" height="28" rx="6" fill="url(#rose)"/>
    <!-- Ribbon vertical -->
    <rect x="52" y="42" width="16" height="108" rx="4" fill="url(#gold)"/>
    <!-- Ribbon horizontal on lid -->
    <rect x="-8" y="50" width="136" height="12" rx="4" fill="url(#gold)"/>
    <!-- Bow left loop -->
    <ellipse cx="38" cy="38" rx="24" ry="14" fill="url(#gold)" transform="rotate(-30 38 38)" opacity="0.9"/>
    <!-- Bow right loop -->
    <ellipse cx="82" cy="38" rx="24" ry="14" fill="url(#gold)" transform="rotate(30 82 38)" opacity="0.9"/>
    <!-- Bow center -->
    <circle cx="60" cy="42" r="10" fill="url(#gold)"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="white" text-anchor="middle" opacity="0.95" font-style="italic">Gifting Butler</text>

  <!-- Divider line -->
  <rect x="420" y="258" width="360" height="2" rx="1" fill="url(#gold)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="320" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle" opacity="0.9" letter-spacing="1">Find the perfect gift in 60 seconds</text>

  <!-- Sub tagline -->
  <text x="600" y="378" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="0.5">Curated gifts for every occasion &amp; every budget</text>

  <!-- CTA pill -->
  <rect x="430" y="430" width="340" height="64" rx="32" fill="url(#rose)"/>
  <text x="600" y="469" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">🎁  Take the Gift Quiz</text>

  <!-- URL -->
  <text x="600" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">giftingbutler-74395.web.app</text>
</svg>
